                <!-- 1. Home / Docs Landing Screen -->
                <section id="home-screen" class="screen-view active">
                    <div class="conversational-landing">
                        <div class="landing-header">
                            <h1 class="landing-title">How can I help you prepare today?</h1>
                            <p class="landing-subtitle">Describe your experience, start a new case, or ask for guidance.
                            </p>
                        </div>

                        <div class="landing-composer">
                            <div class="composer-input-wrapper">
                                <i class="ph ph-sparkle composer-icon"></i>
                                <textarea class="composer-textarea"
                                    placeholder="E.g., I want to get credit for my 3 years as a shift manager..."></textarea>
                                <button class="btn-primary composer-send-btn" id="landing-send-btn">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="12" y1="19" x2="12" y2="5"></line>
                                        <polyline points="5 12 12 5 19 12"></polyline>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="landing-suggestions">
                            <div class="prompt-suggestion"
                                data-prompt="I want to start a new evaluation case for CS400.">
                                <div class="suggestion-icon"><i class="ph-fill ph-rocket-launch"></i></div>
                                <div class="suggestion-text">Start a new evaluation</div>
                            </div>
                            <div class="prompt-suggestion"
                                data-prompt="How do I upload evidence for my prior learning?">
                                <div class="suggestion-icon"><i class="ph-fill ph-file-arrow-up"></i></div>
                                <div class="suggestion-text">Upload my evidence</div>
                            </div>
                            <div class="prompt-suggestion" data-prompt="What kind of experience counts for credit?">
                                <div class="suggestion-icon"><i class="ph-fill ph-question-mark"></i></div>
                                <div class="suggestion-text">How does this work?</div>
                            </div>
                            <div class="prompt-suggestion"
                                data-prompt="Can I resume my draft for the Management course?">
                                <div class="suggestion-icon"><i class="ph-fill ph-arrow-counter-clockwise"></i></div>
                                <div class="suggestion-text">Resume my draft</div>
                            </div>
                        </div>
                    </div>
                </section>
