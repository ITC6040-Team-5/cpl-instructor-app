                <!-- 2. Guided Intake Screen -->
                <section id="intake-screen" class="screen-view">
                    <div class="split-layout">
                        <!-- Chat Column -->
                        <div class="chat-column">
                            <div class="chat-header">
                                <h2>New Evaluation</h2>
                                <span class="badge gray">Echo AI Assistant</span>
                            </div>

                            <div class="chat-transcript" id="intake-chat">
                                <!-- Dynamic: messages rendered by app.js -->
                            </div>

                            <!-- Floating Input Composer -->
                            <div class="composer-area">
                                <div class="composer-box">
                                    <button class="btn-icon-subtle" id="chat-attach-btn" title="Attach evidence file"><svg width="20" height="20" viewBox="0 0 24 24"
                                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <path
                                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                                            </path>
                                        </svg></button>
                                    <textarea placeholder="Type your response to the assistant..."
                                        id="chat-input" autocomplete="off" rows="1"></textarea>
                                    <button class="btn-send" id="chat-send">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <line x1="12" y1="19" x2="12" y2="5"></line>
                                            <polyline points="5 12 12 5 19 12"></polyline>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Record Sidebar (Tabbed) -->
                        <div class="record-sidebar" id="record-sidebar" style="position: relative;">
                        <button class="sidebar-collapse-btn" id="record-sidebar-toggle" title="Toggle case record">
                            <i class="ph ph-caret-right"></i>
                        </button>
                            <div class="record-header">
                                <div class="record-tabs">
                                    <button class="record-tab active" data-tab="case-record-tab">Case Record</button>
                                    <button class="record-tab" data-tab="evidence-tab">Evidence</button>
                                </div>
                                <button class="btn-icon text-muted"><i class="ph ph-arrows-out-simple"></i></button>
                            </div>

                            <!-- Tab: Case Record -->
                            <div class="record-tab-content active" id="case-record-tab">
                                <div class="record-content" id="intake-case-record">
                                    <div class="field-group">
                                        <label>Target Course</label>
                                        <div class="field-value" id="intake-target-course">—</div>
                                    </div>
                                    <div class="field-group">
                                        <label>Case ID</label>
                                        <div class="field-value font-mono" id="intake-case-id">—</div>
                                    </div>
                                    <div class="field-group">
                                        <label>Status</label>
                                        <div class="field-value" id="intake-case-status">No active case</div>
                                    </div>
                                    <div class="field-group">
                                        <label>Summary of Experience</label>
                                        <div class="field-box" id="intake-case-summary">Start a conversation to begin building your case.</div>
                                    </div>
                                    <div class="competencies-section" id="intake-competencies-section" style="display:none;">
                                        <label style="font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.05em;">Claimed Competencies</label>
                                        <div class="competencies-list" id="intake-competencies-list"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- Tab: Evidence -->
                            <div class="record-tab-content" id="evidence-tab">
                                <div class="record-content">
                                    <div class="mini-dropzone">
                                        <i class="ph ph-cloud-arrow-up"></i>
                                        <span>Drop files here or <a href="#">browse</a></span>
                                    </div>
                                    <div class="field-group mt-3">
                                        <label>Attached Files</label>
                                        <div class="compact-file-list" id="intake-evidence-list">
                                            <p class="text-sm text-muted">No files uploaded yet.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="record-footer">
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill" style="width: 0%;"></div>
                                </div>
                                <div class="progress-text">0% Complete</div>
                                <button class="btn-primary full-width mt-3" id="submit-for-review-btn" disabled title="Case must reach 80% completion">Submit for Review</button>
                            </div>
                        </div>
                    </div>
                </section>
